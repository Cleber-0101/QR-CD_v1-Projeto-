name: Deploy site CD-QR

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Puxar código
        uses: actions/checkout@v3

      - name: Verificar arquivos antes do deploy
        run: |
          echo "📁 Diretório atual: $(pwd)"
          echo "=== Arquivos que serão publicados ==="
          ls -la
          echo "=== index.html existe? ==="
          test -f index.html && echo "✅ index.html encontrado" || echo "❌ index.html NÃO encontrado"
          test -f style.css && echo "✅ style.css encontrado" || echo "❌ style.css NÃO encontrado"
          test -f script.js && echo "✅ script.js encontrado" || echo "❌ script.js NÃO encontrado"

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./

      - name: Confirmar deploy
        run: |
          echo "✅ Deploy concluído com sucesso!"
          echo "🌐 Acesse: https://<Cleber-0101>.github.io/<seu-repositorio>"
          echo "📅 Data/hora: $(date)"